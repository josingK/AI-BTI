<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-BTI: 나의 AI 부캐 찾기</title>
    <style>
        :root {
            --primary-color: #3498db;
            --tier-a: #f1c40f;
            --tier-bc: #2ecc71;
            --tier-d: #95a5a6;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #2c3e50;
        }

        .container {
            width: 100%;
            max-width: 540px;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            box-sizing: border-box;
        }

        /* 메인 시작 화면 */
        #start-screen h1 { font-size: 2.2rem; margin-bottom: 10px; color: #2c3e50; font-weight: 800; }
        #start-screen h2 { font-size: 1.2rem; margin-bottom: 10px; color: var(--primary-color); }
        #start-screen p { color: #7f8c8d; margin-bottom: 30px; line-height: 1.6; }

        /* 프로그레스 바 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
            display: none;
        }
        .progress-ing {
            width: 0%;
            height: 100%;
            background: var(--primary-color);
            transition: width 0.3s ease;
        }

        /* 질문 영역 */
        #quiz-screen { display: none; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 25px; line-height: 1.5; min-height: 4.5rem; word-break: keep-all; }
        
        /* 답변 버튼 스타일 */
        .answer-list { display: flex; flex-direction: column; gap: 12px; }
        .btn-answer {
            padding: 16px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: 500;
            color: #4a5568;
        }
        .btn-answer:hover {
            border-color: var(--primary-color);
            background: #f0f7ff;
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        /* 결과 화면 */
        #result-screen { display: none; animation: fadeIn 0.8s; }
        .tier-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; }
        .nickname { font-size: 2.2rem; font-weight: 800; margin-bottom: 20px; color: #1a202c; word-break: keep-all;}
        .result-desc { background: #f8f9fa; padding: 25px; border-radius: 16px; text-align: left; line-height: 1.7; margin-bottom: 25px; font-size: 1rem;}
        .trait-scores { margin-top: 15px; font-size: 0.9rem; color: #718096; border-top: 1px solid #e2e8f0; padding-top: 15px;}
        
        .btn-main {
            padding: 18px 40px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .btn-main:hover { background: #2980b9; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

            setupQuestions();
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('progress-bar').style.display = 'block';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const currentQ = selectedQuestions[currentIdx];
            document.getElementById('question-text').innerText = `Q${currentIdx + 1}. ${currentQ.text}`;
            
            // 답변 순서 고정 생성
            const answerContainer = document.getElementById('answer-list');
            answerContainer.innerHTML = ''; // 초기화

            answerScales.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = 'btn-answer';
                btn.innerText = ans.text;
                btn.onclick = () => handleAnswer(currentQ.trait, ans.score);
                answerContainer.appendChild(btn);
            });

            // 프로그레스 바 업데이트 (총 48문항 기준)
            const progress = ((currentIdx + 1) / 48) * 100;
            document.getElementById('progress-ing').style.width = `${progress}%`;
        }

        function handleAnswer(trait, score) {
            scores[trait] += score; // 해당 트리에 점수 누적
            
            if (currentIdx < selectedQuestions.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('progress-bar').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            const totalScore = scores.A + scores.B + scores.C + scores.D;
            
            // 가장 점수가 높은 트리 찾기
            let maxTrait = 'A';
            let maxScore = scores.A;
            ['B', 'C', 'D'].forEach(trait => {
                if(scores[trait] > maxScore) {
                    maxScore = scores[trait];
                    maxTrait = trait;
                }
            });

            let finalJob = {};
            let tierText = "";
            let tierColor = "";

            // 1. 마스터 판정 (총점 204점 이상 & 모든 분야 최소 42점 이상)
            if (totalScore >= 204 && scores.A >= 42 && scores.B >= 42 && scores.C >= 42 && scores.D >= 42) {
                tierText = "MASTER: 최상위 지배자";
                tierColor = "#f1c40f";
                // A(설계)+C(생산)이 높으면 총사령관, B(분석)+D(운영)이 높으면 전략의 대가
                if ((scores.A + scores.C) >= (scores.B + scores.D)) {
                    finalJob = jobs.master[0]; 
                } else {
                    finalJob = jobs.master[1];
                }
            } 
            // 2. 비기너 판정 (총점 108점 미만)
            else if (totalScore < 108) {
                tierText = "BEGINNER: 성장하는 초심자";
                tierColor = "#95a5a6";
                if ((scores.A + scores.C) >= (scores.B + scores.D)) {
                    finalJob = jobs.beginner[0];
                } else {
                    finalJob = jobs.beginner[1];
                }
            } 
            // 3. 스페셜리스트 판정 (상, 중상, 중, 중하)
            else {
                tierText = "SPECIALIST: 실무 최적화 고수";
                tierColor = "#2ecc71";
                
                // 해당 트리의 점수에 맞는 직업 찾기
                const traitJobs = jobs.specialist[maxTrait];
                for(let i=0; i<traitJobs.length; i++){
                    if(maxScore >= traitJobs[i].scoreReq){
                        finalJob = traitJobs[i];
                        break;
                    }
                }
            }

            const badge = document.getElementById('tier-badge');
            badge.innerText = tierText;
            badge.style.backgroundColor = tierColor;
            badge.style.color = (totalScore < 108) ? "white" : "black";
            
            document.getElementById('result-nickname').innerText = finalJob.name;
            
            // 결과 상세 설명 및 스탯 출력 (만점 240점 표기)
            const descHtml = `
                ${finalJob.desc}
                <div class="trait-scores">
                    <strong>나의 AI 스탯 분석 (총 ${totalScore}점 / 240점)</strong><br>
                    📐 설계(A): ${scores.A}점 &nbsp;|&nbsp; 🔍 분석(B): ${scores.B}점<br>
                    ⚡ 생산(C): ${scores.C}점 &nbsp;|&nbsp; 🛡️ 운영(D): ${scores.D}점
                </div>
            `;
            document.getElementById('result-desc').innerHTML = descHtml;
        }
    </script>
</body>
</html>
