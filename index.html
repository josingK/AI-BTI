<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-BTI: 나의 AI 부캐 찾기</title>
    <style>
        :root {
            --primary-color: #3498db;
            --tier-a: #f1c40f;
            --tier-bc: #2ecc71;
            --tier-d: #95a5a6;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #2c3e50;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            box-sizing: border-box;
            margin: 20px 0;
        }

        /* 메인 시작 화면 */
        #start-screen h1 { font-size: 2.2rem; margin-bottom: 10px; color: #2c3e50; font-weight: 800; word-break: keep-all; }
        #start-screen h2 { font-size: 1.2rem; margin-bottom: 10px; color: var(--primary-color); }
        #start-screen p { color: #7f8c8d; margin-bottom: 30px; line-height: 1.6; word-break: keep-all;}

        /* 프로그레스 바 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
            display: none;
        }
        .progress-ing {
            width: 0%;
            height: 100%;
            background: var(--primary-color);
            transition: width 0.3s ease;
        }

        /* 질문 영역 */
        #quiz-screen { display: none; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 25px; line-height: 1.5; min-height: 4.5rem; word-break: keep-all; }
        
        /* 답변 버튼 스타일 */
        .answer-list { display: flex; flex-direction: column; gap: 10px; }
        .btn-answer {
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: 600;
            color: #4a5568;
            word-break: keep-all;
        }
        .btn-answer:hover {
            border-color: var(--primary-color);
            background: #f0f7ff;
            color: var(--primary-color);
            transform: translateY(-2px);
        }

        /* 결과 화면 */
        #result-screen { display: none; animation: fadeIn 0.8s; }
        
        #result-image {
            width: 280px;
            height: 280px;
            margin: 0 auto 25px auto;
            border-radius: 20px; 
            object-fit: cover;
            display: block;
            border: 4px solid #edf2f7;
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        .tier-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; margin-bottom: 15px; }
        .nickname { font-size: 2rem; font-weight: 800; margin-bottom: 20px; color: #1a202c; word-break: keep-all;}
        
        /* 💡 상세 결과 뷰 스타일 */
        .result-desc { background: #f8f9fa; padding: 25px; border-radius: 16px; text-align: left; margin-bottom: 25px; }
        .desc-main { font-size: 1.05rem; line-height: 1.6; color: #2c3e50; margin-bottom: 20px; word-break: keep-all; font-weight: 500;}
        
        .detail-box {
            background: #ffffff;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid #edf2f7;
        }
        .detail-box h4 {
            margin: 0 0 12px 0;
            font-size: 1.05rem;
            color: #2d3748;
        }
        .strengths-list {
            margin: 0;
            padding-left: 20px;
            color: #4a5568;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .strengths-list li { margin-bottom: 6px; }
        
        .quest-box {
            background: #fffaf0;
            border: 1px solid #feebc8;
        }
        .quest-box h4 { color: #dd6b20; }
        .quest-text {
            color: #c05621;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.5;
            word-break: keep-all;
        }

        .trait-scores { margin-top: 20px; font-size: 0.9rem; color: #718096; border-top: 1px solid #e2e8f0; padding-top: 20px; text-align: center; line-height: 1.6;}
        
        .btn-main {
            padding: 16px 30px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .btn-main:hover { background: #2980b9; }

        @media (max-width: 480px) {
            .container { padding: 25px 20px; width: 95%; }
            #start-screen h1 { font-size: 1.8rem; }
            #start-screen h2 { font-size: 1rem; }
            .question-text { font-size: 1.1rem; min-height: 4rem;}
            .btn-answer { padding: 12px; font-size: 0.95rem; }
            #result-image { width: 220px; height: 220px; } 
            .nickname { font-size: 1.6rem; }
            .result-desc { padding: 15px; }
            .desc-main { font-size: 0.95rem; }
            .btn-main { padding: 14px 20px; font-size: 1rem; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div id="start-screen">
            <div style="font-size: 3.5rem; margin-bottom: 15px;">🤖</div>
            <h2>나의 AI 부캐 찾기</h2>
            <h1>AI-BTI</h1>
            <p>48개의 상세한 상황별 대처법으로 알아보는<br>나만의 생성 AI 활용 직업군 테스트</p>
            <button class="btn-main" onclick="startQuiz()">테스트 시작하기</button>
        </div>

        <div class="progress-bar" id="progress-bar"><div class="progress-ing" id="progress-ing"></div></div>
        
        <div id="quiz-screen">
            <div class="question-text" id="question-text">질문 내용</div>
            <div class="answer-list" id="answer-list">
                </div>
        </div>

        <div id="result-screen">
            <img id="result-image" src="" alt="나의 AI 부캐 캐릭터">
            
            <div id="tier-badge" class="tier-badge">TIER</div>
            <div class="nickname" id="result-nickname">부캐명</div>
            <div class="result-desc" id="result-desc">설명</div>
            <button class="btn-main" onclick="location.reload()">다시 테스트하기</button>
        </div>
    </div>

        const answerScales = [
            { text: "매우 그렇다", score: 5 },

            { text: "그렇지 않은 편이다", score: 2 },
            { text: "전혀 그렇지 않다", score: 1 }
        ];

        let selectedQuestions = [];
        let currentIdx = 0;
        let scores = { A: 0, B: 0, C: 0, D: 0 };

        function setupQuestions() {
            selectedQuestions = [];
            for(let i = 0; i < 12; i++) {
                selectedQuestions.push({ text: poolA[i], trait: 'A' });
                selectedQuestions.push({ text: poolB[i], trait: 'B' });
                selectedQuestions.push({ text: poolC[i], trait: 'C' });
                selectedQuestions.push({ text: poolD[i], trait: 'D' });
            }
        }

        function startQuiz() {
            setupQuestions();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('progress-bar').style.display = 'block';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const currentQ = selectedQuestions[currentIdx];
            document.getElementById('question-text').innerText = `Q${currentIdx + 1}. ${currentQ.text}`;
            
            const answerContainer = document.getElementById('answer-list');
            answerContainer.innerHTML = ''; 

            answerScales.forEach(ans => {
                const btn = document.createElement('button');
                btn.className = 'btn-answer';
                btn.innerText = ans.text;
                btn.onclick = () => handleAnswer(currentQ.trait, ans.score);
                answerContainer.appendChild(btn);
            });

            const progress = ((currentIdx + 1) / 48) * 100;
            document.getElementById('progress-ing').style.width = `${progress}%`;
        }

        function handleAnswer(trait, score) {
            scores[trait] += score; 
            if (currentIdx < selectedQuestions.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('progress-bar').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            const totalScore = scores.A + scores.B + scores.C + scores.D;
            
            let maxTrait = 'A';
            let maxScore = scores.A;
            ['B', 'C', 'D'].forEach(trait => {
                if(scores[trait] > maxScore) {
                    maxScore = scores[trait];
                    maxTrait = trait;
                }
            });

            let finalJob = {};
            let tierText = "";
            let tierColor = "";

            if (totalScore >= 204 && scores.A >= 42 && scores.B >= 42 && scores.C >= 42 && scores.D >= 42) {
                tierText = "MASTER: 최상위 지배자";
                tierColor = "#f1c40f";
                if ((scores.A + scores.C) >= (scores.B + scores.D)) {
                    finalJob = jobs.master[0]; 
                } else {
                    finalJob = jobs.master[1];
                }
            } 
            else if (totalScore < 108) {
                tierText = "BEGINNER: 성장하는 초심자";
                tierColor = "#95a5a6";
                if ((scores.A + scores.C) >= (scores.B + scores.D)) {
                    finalJob = jobs.beginner[0];
                } else {
                    finalJob = jobs.beginner[1];
                }
            } 
            else {
                tierText = "SPECIALIST: 실무 최적화 고수";
                tierColor = "#2ecc71";
                const traitJobs = jobs.specialist[maxTrait];
                for(let i=0; i<traitJobs.length; i++){
                    if(maxScore >= traitJobs[i].scoreReq){
                        finalJob = traitJobs[i];
                        break;
                    }
                }
            }

            const badge = document.getElementById('tier-badge');
            badge.innerText = tierText;
            badge.style.backgroundColor = tierColor;
            badge.style.color = (totalScore < 108) ? "white" : "black";
            
            document.getElementById('result-nickname').innerText = finalJob.name;
            
            const resultImage = document.getElementById('result-image');
            resultImage.src = finalJob.imageUrl;
            resultImage.style.display = 'block';

            // 💡 추가된 상세 설명 HTML 템플릿
            let strengthsList = finalJob.strengths.map(s => `<li>${s}</li>`).join('');
            
            const descHtml = `
                <div class="desc-main">${finalJob.desc}</div>
                
                <div class="detail-box">
                    <h4>✨ 나의 AI 강점</h4>
                    <ul class="strengths-list">
                        ${strengthsList}
                    </ul>
                </div>

                <div class="detail-box quest-box">
                    <h4>🎯 다음 퀘스트 (Next Quest)</h4>
                    <div class="quest-text">
                        ${finalJob.mission}
                    </div>
                </div>

                <div class="trait-scores">
                    <strong>📊 나의 AI 스탯 분석 (총 ${totalScore}점 / 240점)</strong><br><br>
                    📐 설계(A): ${scores.A}점 &nbsp;|&nbsp; 🔍 분석(B): ${scores.B}점<br>
                    ⚡ 생산(C): ${scores.C}점 &nbsp;|&nbsp; 🛡️ 운영(D): ${scores.D}점
                </div>
            `;
            document.getElementById('result-desc').innerHTML = descHtml;
        }
    </script>
