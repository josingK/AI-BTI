<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-BTI 부캐 도감</title>
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: #2c3e50;
            margin: 0;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; }
        .header p { color: #7f8c8d; font-size: 1.1rem; }

        /* 그리드 레이아웃 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 직업 카드 스타일 */
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #edf2f7;
        }

        .card-tier {
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            background: var(--primary-color);
            padding: 4px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .card h3 { margin: 0 0 10px 0; font-size: 1.2rem; word-break: keep-all; }
        .card p { margin: 0; font-size: 0.9rem; color: #7f8c8d; word-break: keep-all; line-height: 1.4; }

        /* 팝업(모달) 스타일 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #a0aec0;
            background: none;
            border: none;
        }

        .close-btn:hover { color: #2d3748; }

        /* 모달 내부 상세 스타일 */
        .modal-header { text-align: center; margin-bottom: 25px; }
        .modal-header img { width: 150px; height: 150px; border-radius: 20px; border: 4px solid #edf2f7; margin-bottom: 15px; }
        .modal-title { font-size: 2rem; font-weight: 800; margin: 10px 0; color: #1a202c; }
        .modal-oneliner { font-size: 1.1rem; color: var(--primary-color); font-weight: 600; margin-bottom: 20px; word-break: keep-all; }
        
        .modal-section { background: #f8f9fa; border-radius: 16px; padding: 20px; margin-bottom: 20px; text-align: left; }
        .modal-section h4 { margin: 0 0 15px 0; font-size: 1.1rem; color: #2d3748; }
        
        .scene-text { font-size: 0.95rem; line-height: 1.6; color: #4a5568; white-space: pre-wrap; }
        .list-text { margin: 0; padding-left: 20px; font-size: 0.95rem; line-height: 1.6; color: #4a5568; }
        .list-text li { margin-bottom: 8px; }
        
        .quest-box { background: #fffaf0; border: 1px solid #feebc8; }
        .quest-box h4 { color: #dd6b20; }
        .quest-content { font-size: 0.95rem; font-weight: 600; color: #c05621; line-height: 1.5; }

        @media (max-width: 480px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .card { padding: 15px; }
            .card img { width: 80px; height: 80px; }
            .card h3 { font-size: 1rem; }
            .card p { font-size: 0.8rem; display: none; } /* 모바일에서는 한줄설명 숨김 */
            .modal-content { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📖 AI-BTI 부캐 도감</h1>
        <p>우리 회사에 존재하는 20가지 AI 행동 유형을 확인해보세요!<br>카드를 클릭하면 상세 프로필을 볼 수 있습니다.</p>
    </div>

    <div class="grid-container" id="grid-container">
        </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">

            <button class="close-btn" onclick="closeModal(event)">✖</button>
            <div class="modal-header">

                <h2 class="modal-title" id="m-name">이름</h2>

            <div class="modal-section">

            </div>

            <div class="modal-section">

                <ul class="list-text" id="m-strengths"></ul>
            </div>

            <div class="modal-section">
                <h4>💡 보완하면 좋을 점</h4>
                <ul class="list-text" id="m-weaknesses"></ul>
            </div>

            <div class="modal-section quest-box">
                <h4>🎯 다음 퀘스트 (Next Level)</h4>
                <div class="quest-content" id="m-quest"></div>
            </div>
        </div>
    </div>

            const tierBadge = document.getElementById('m-tier');
            tierBadge.innerText = job.tier;
            tierBadge.style.backgroundColor = job.color;
            
            document.getElementById('m-name').innerText = job.name;
            document.getElementById('m-oneliner').innerText = `"${job.oneLiner}"`;
            document.getElementById('m-scene').innerText = job.scene;
            
            const strengthsHtml = job.strengths.map(s => `<li>${s}</li>`).join('');
            document.getElementById('m-strengths').innerHTML = strengthsHtml;
            
            const weaknessesHtml = job.weaknesses.map(w => `<li>${w}</li>`).join('');
            document.getElementById('m-weaknesses').innerHTML = weaknessesHtml;
            
            document.getElementById('m-quest').innerText = job.mission;

            modalOverlay.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // 스크롤 방지
        }

        // 모달 닫기
        function closeModal(event) {
            if (event.target === modalOverlay || event.target.className === 'close-btn') {
                modalOverlay.style.display = 'none';
                document.body.style.overflow = 'auto'; // 스크롤 복구
            }
        }
    </script>
</body>
</html>
