<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-BTI 부캐 도감</title>
    <style>
        :root {
            --primary-color: #3498db;
            --bg-color: #f4f6f8;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: #2c3e50;
            margin: 0;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; color: #1a202c; }
        .header p { color: #718096; font-size: 1.1rem; line-height: 1.6; }

        /* 그리드 레이아웃 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 직업 카드 스타일 */
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
            border-color: var(--primary-color);
        }

        .card img {
            width: 110px;
            height: 110px;
            border-radius: 25%;
            object-fit: cover;
            margin-bottom: 18px;
            border: 1px solid #edf2f7;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .card-tier {
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            background: var(--primary-color);
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .card h3 { margin: 0 0 10px 0; font-size: 1.25rem; word-break: keep-all; color: #2d3748; font-weight: 800; }
        .card p { margin: 0; font-size: 0.9rem; color: #718096; word-break: keep-all; line-height: 1.5; }

        /* 💡 모달(상세 팝업) 레이아웃 전면 수정 (잘림 현상 해결) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            z-index: 1000;
            backdrop-filter: blur(4px);
            overflow-y: auto; /* 박스 내부가 아닌 배경 전체가 스크롤 되도록 변경 */
            padding: 80px 20px 40px 20px; /* 상단에 80px 여백을 주어 캐릭터가 잘리지 않게 방어 */
            box-sizing: border-box;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto; /* 가로 중앙 정렬 */
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 70px 30px 30px 30px; 
            /* 제한 높이(max-height) 삭제하여 내용 길이에 맞게 쭉 늘어나도록 설정 */
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #a0aec0;
            background: none;
            border: none;
            z-index: 10;
        }

        .close-btn:hover { color: #4a5568; }

        .modal-avatar {
            position: absolute;
            top: -60px; /* 박스 위로 60px 튀어나옴 */
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            border-radius: 30%;
            border: 6px solid white;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            object-fit: cover;
        }

        .modal-header { text-align: center; margin-bottom: 25px; }
        .modal-title { font-size: 1.8rem; font-weight: 800; margin: 10px 0; color: #1a202c; }
        .modal-oneliner { font-size: 1.05rem; color: var(--primary-color); font-weight: 600; margin-bottom: 20px; word-break: keep-all; line-height: 1.4;}
        
        .modal-section { background: #f8f9fa; border-radius: 16px; padding: 20px; margin-bottom: 15px; text-align: left; }
        .modal-section h4 { margin: 0 0 15px 0; font-size: 1.05rem; color: #2d3748; display: flex; align-items: center; gap: 8px;}
        
        .scene-text { font-size: 0.95rem; line-height: 1.65; color: #4a5568; white-space: pre-wrap; }
        .list-text { margin: 0; padding-left: 22px; font-size: 0.95rem; line-height: 1.6; color: #4a5568; }
        .list-text li { margin-bottom: 8px; }
        
        .quest-box { background: #fffaf0; border: 1px solid #feebc8; }
        .quest-box h4 { color: #dd6b20; }
        .quest-content { font-size: 0.95rem; font-weight: 600; color: #c05621; line-height: 1.5; white-space: pre-wrap;}

        @media (max-width: 480px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .card { padding: 20px 15px; }
            .card img { width: 80px; height: 80px; }
            .card h3 { font-size: 1.1rem; }
            .card p { display: none; }
            
            /* 모바일 세로 화면 대응 */
            .modal-overlay { padding: 70px 15px 30px 15px; } /* 상단 여백 유지 */
            .modal-content { padding: 60px 20px 25px 20px; }
            .modal-avatar { width: 100px; height: 100px; top: -50px; }
            .modal-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📖 AI-BTI 부캐 도감</h1>
        <p>48개 실무 상황으로 알아보는 AI 행동 유형을 확인해보세요!<br>카드를 클릭하면 상세 프로필과 퀘스트를 볼 수 있습니다.</p>
    </div>

    <div class="grid-container" id="grid-container">
        </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal(event)">✖</button>
            
            <img id="m-image" class="modal-avatar" src="" alt="캐릭터">
            
            <div class="modal-header">
                <div class="card-tier" id="m-tier">티어</div>
                <h2 class="modal-title" id="m-name">이름</h2>
                <div class="modal-oneliner" id="m-oneliner">한줄설명</div>
            </div>
            
            <div class="modal-section">
                <h4>🎬 결정적 씬 (Scene)</h4>
                <div class="scene-text" id="m-scene">장면 설명</div>
            </div>

            <div class="modal-section">
                <h4>✨ 나의 강점</h4>
                <ul class="list-text" id="m-strengths"></ul>
            </div>

            <div class="modal-section">
                <h4>💡 보완하면 좋을 점</h4>
                <ul class="list-text" id="m-weaknesses"></ul>
            </div>

            <div class="modal-section quest-box">
                <h4>🎯 다음 퀘스트 (Next Quest)</h4>
                <div class="quest-content" id="m-quest"></div>
            </div>
        </div>
    </div>

    <script>

            document.getElementById('m-image').src = job.img;

            tierBadge.innerText = job.tier;
            tierBadge.style.backgroundColor = job.color;

            document.getElementById('m-oneliner').innerText = `"${job.oneLiner}"`;
            document.getElementById('m-scene').innerText = job.scene;
            
            const strengthsHtml = job.strengths.map(s => `<li>${s}</li>`).join('');

            const weaknessesHtml = job.weaknesses.map(w => `<li>${w}</li>`).join('');
            document.getElementById('m-weaknesses').innerHTML = weaknessesHtml;
            
            document.getElementById('m-quest').innerText = job.mission;

        }

        // 모달 닫기
        function closeModal(event) {
            if (event.target === modalOverlay || event.target.className === 'close-btn') {
